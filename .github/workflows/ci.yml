name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Verify drift detection on demo
        run: |
          set +e
          npm run dev -- check --pattern "examples/**/*.ts"
          status=$?
          if [ "$status" -ne 1 ]; then
            echo "Expected exit code 1 for intentional demo drift, got $status"
            exit 1
          fi
